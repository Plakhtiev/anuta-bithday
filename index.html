<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>З Днем Народження!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@300;600&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #2c1e14 0%, #000000 100%);
            font-family: 'Montserrat', sans-serif;
            color: #f3e5d8;
            overflow: hidden;
        }

        .container {
            position: relative;
            max-width: 600px;
            width: 90%;
            text-align: center;
            z-index: 10;
        }

        .photo-frame {
            position: relative;
            padding: 15px;
            background: linear-gradient(45deg, #d4af37, #fcf6ba, #b8860b, #e6be8a);
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4);
            animation: glow 3s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); }
            to { box-shadow: 0 0 60px rgba(212, 175, 55, 0.7); }
        }

        .photo-frame img {
            width: 100%;
            border-radius: 10px;
            display: block;
            filter: contrast(1.1) brightness(1.05);
        }

        .birthday-text {
            margin-top: 30px;
            animation: fadeInDown 1.5s ease-out;
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: 4rem;
            margin: 0;
            background: linear-gradient(to right, #fcf6ba, #d4af37, #fcf6ba);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-top: 15px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: fly 4s infinite linear;
        }

        @keyframes fly {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh) scale(1); opacity: 0; }
        }

        .btn {
            margin-top: 25px;
            padding: 12px 35px;
            border: 2px solid #d4af37;
            background: transparent;
            color: #d4af37;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 20px #d4af37;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="photo-frame">
            <img src="unnamed.webp" alt="З Днем Народження">
        </div>
        
        <div class="birthday-text">
            <h1>З Днем Народження!</h1>
            <p>Нехай твоє життя сяє так само яскраво, як ці вогні. <br> Будь щасливою, коханою та завжди натхненною!</p>
            <button class="btn" onclick="createConfetti()">Більше магії!</button>
        </div>
    </div>

    <script>
        function createSparkles() {
            const body = document.querySelector('body');
            for(let i = 0; i < 50; i++) {
                let sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                let size = Math.random() * 4 + 'px';
                sparkle.style.width = size;
                sparkle.style.height = size;
                sparkle.style.left = Math.random() * 100 + 'vw';
                sparkle.style.top = Math.random() * 100 + 'vh';
                sparkle.style.animationDelay = Math.random() * 5 + 's';
                body.appendChild(sparkle);
            }
        }

        function createConfetti() {
            for(let i = 0; i < 30; i++) {
                let confetti = document.createElement('div');
                confetti.className = 'sparkle';
                confetti.style.background = `gold`;
                confetti.style.width = '10px';
                confetti.style.height = '10px';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.bottom = '0';
                confetti.style.animation = 'fly 2s ease-out forwards';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 2000);
            }
        }

        createSparkles();
    </script>
</body>
</html>
